<!doctype html>
<head>
    <title>AzyMyt Demonlist</title>
    <link rel="icon" href="../images/favicon.png" type="image/x-icon">
    <meta property="og:title" content="AzyMyt Demon Stats" />
    <meta property="og:image" content="../images/favicon.png"/>
    <meta property="og:type" content="website" />
    <meta
        property="og:description"
        content="My personal Geometry Dash demon list"
    />

    <script src="DL.js" defer></script>
    <link rel="stylesheet" href="DL.css"></link>
</head>

<body>
    <div class="contents">

        <img src="../images/image.png" width="100%" style="border-radius: 10px;">

        <div class="optionsContainer">
            <div class="options">
                <button class="btnToggle" id="modern">List</button>
                <button class="btnToggle" id="grid" title="Unfinished, Unpolished">Grid</button>
            </div>
            <div class="options">
                <button class="btnToggleType" id="classics">Classics</button>
                <button class="btnToggleType" id="platformers">Platformers</button>
            </div>
            <div class="options"> 
                <button class="btnLevelsType" id="personal">Personal</button>
                <button class="btnLevelsType" id="aredl" title="Not implemented">General</button>
            </div>
            <div class="options">
                <button class="btnDateView" id="dateDisabled">Current</button>
                <button class="btnDateView" id="dateBefore">Before</button>
                <button class="btnDateView" id="dateAfter">After</button>
                <input class="txtDateView" id="dateArea" title="Sorting by dates is inaccurate for now (javascript is not good at handling dates)"></input>
            </div>
            <div class="options">
                <button class="btnDisplay" id="completions">Completions</button>
                <button class="btnDisplay" id="progress">Progress</button>
            </div>
        </div> 
        
    </div>
    <a href="https://docs.google.com/spreadsheets/d/1dIL3JjvLz9QGQPUxDUlIIZmjR2kRAXtgMel7Fyil-j4/edit?usp=sharing" target="_blank">Sheet version</a>

    <div id="list" class="list">
    
    </div>
</body>
